summary = "DoctorNVDA"
description = """NVDA için nihai sağlık araç seti. Ayarları yedekleyin ve geri yükleyin, çakışan eklentileri ikili arama ile belirleyin, sistem bilgilerini görüntüleyin ve eklentileri devre dışı bırakarak güvenli bir şekilde yeniden başlatın; hepsi tek bir kullanışlı menüden. NVDA'nızı sorunsuz çalıştırın!
Kısayol Tuşları:
ALT+Windows+D
Tek Tıklama: DoctorNVDA menüsünü açar
Çift Tıklama: NVDA'yı yeniden başlatır
Üç Tıklama: NVDA'yı eklentiler devre dışı olarak yeniden başlatır"""