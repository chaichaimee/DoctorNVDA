summary = "DoctorNVDA"
description = """Toolkit kesihatan utama untuk NVDA. Sandar & pulih tetapan dengan mudah, kenal pasti add-on konflik dengan carian binari, lihat info sistem, mula semula dengan selamat tanpa add-on, dan jalankan pemeriksaan kesihatan; semuanya dari satu menu. Pastikan NVDA anda lancar!
Kekunci Pintas:
ALT+Windows+D
Satu Ketukan: buka menu DoctorNVDA
Dua Ketukan: Mula semula NVDA
Tiga Ketukan: Mula semula NVDA dengan add-on dinyahaktifkan"""