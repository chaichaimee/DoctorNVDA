summary = "DoctorNVDA"
description = """Ultimaattinen työkalupakki NVDA:n ylläpitoon. Varmuuskopioi ja palauta asetukset, paikanna ristiriitaiset lisäosat binaarihaulla, tarkastele järjestelmätietoja, käynnistä turvallisesti ilman lisäosia ja suorita kuntotarkastuksia; kaikki yhdestä valikosta. Pidä NVDA käynnissä sujuvasti!
Pikanäppäimet:
ALT+Windows+D
Yksi napautus: avaa DoctorNVDA-valikko
Kaksi napautusta: Käynnistä NVDA uudelleen
Kolme napautusta: Käynnistä NVDA uudelleen lisäosat poistettuina käytöstä"""