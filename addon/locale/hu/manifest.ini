summary = "DoctorNVDA"
description = """Az ultimátum egészségügyi eszköztár az NVDA-hoz. Mentse és állítsa vissza a beállításokat, találja meg az ütköző kiegészítőket bináris kereséssel, nézze meg a rendszerinfót, indítsa újra biztonságosan letiltott kiegészítőkkel; mindezt egy kényelmes menüből. Tartsa NVDA-ját zökkenőmentesen!
Gyorsbillentyűk:
ALT+Windows+D
Egy koppintás: DoctorNVDA menü megnyitása
Dupla koppintás: NVDA újraindítása
Tripla koppintás: NVDA újraindítása letiltott kiegészítőkkel"""