summary = "DoctorNVDA"
description = """Špičková sada nástrojů pro zdraví vašeho NVDA. Snadno zálohujte a obnovujte základní nastavení, identifikujte konfliktní doplňky pomocí binárního vyhledávání, prohlížejte podrobné systémové informace, restartujte bezpečně s deaktivovanými doplňky a provádějte kontroly stavu; to vše z jednoho pohodlného menu. Udržujte své NVDA v plynulém chodu!
Klávesové zkratky:
ALT+Windows+D
Jedno klepnutí: otevřít menu DoctorNVDA
Dvojité klepnutí: Restartovat NVDA
Trojité klepnutí: Restartovat NVDA s deaktivovanými doplňky"""