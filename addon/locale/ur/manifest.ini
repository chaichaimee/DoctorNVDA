summary = "DoctorNVDA"
description = """NVDA کے لیے حتمی ہیلتھ ٹول کٹ۔ بنیادی ترتیبات کا بیک اپ اور بحالی، بائنری سرچ کے ذریعے متصادم ایڈ آنز کی شناخت، سسٹم کی معلومات دیکھنا، اور ایڈ آنز کو معطل کر کے محفوظ طریقے سے ری اسٹارٹ کرنا؛ سب کچھ ایک ہی مینو سے۔ اپنے NVDA کو ہموار رکھیں۔
ہاٹ کیز:
ALT+Windows+D
ایک بار دبائیں: DoctorNVDA مینو کھولیں
دو بار دبائیں: NVDA ری اسٹارٹ کریں
تین بار دبائیں: ایڈ آنز کو معطل کر کے NVDA ری اسٹارٹ کریں"""