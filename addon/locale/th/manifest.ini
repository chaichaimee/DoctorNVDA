summary = "DoctorNVDA"
description = """ชุดเครื่องมือดูแลสุขภาพขั้นสุดยอดสำหรับ NVDA สำรองและเรียกคืนการตั้งค่าหลัก ค้นหาโปรแกรมเสริมที่ขัดแย้งกันด้วยการค้นหาแบบไบนารี ดูข้อมูลระบบโดยละเอียด รีสตาร์ทอย่างปลอดภัยโดยปิดใช้งานโปรแกรมเสริม และตรวจสอบสุขภาพ ทั้งหมดได้จากเมนูเดียวที่สะดวกสบาย ช่วยให้ NVDA ของคุณทำงานได้อย่างราบรื่น!
ปุ่มลัด:
ALT+Windows+D
กดครั้งเดียว: เปิดเมนู DoctorNVDA
กดสองครั้ง: รีสตาร์ท NVDA
กดสามครั้ง: รีสตาร์ท NVDA โดยปิดใช้งานโปรแกรมเสริม"""