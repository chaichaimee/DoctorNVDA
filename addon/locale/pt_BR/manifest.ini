summary = "DoctorNVDA"
description = """O kit de ferramentas de saúde definitivo para o NVDA. Faça backup e restaure configurações, localize complementos em conflito com busca binária, veja informações do sistema e reinicie com segurança sem complementos; tudo em um menu conveniente. Mantenha seu NVDA funcionando bem!
