summary = "DoctorNVDA"
description = """Bộ công cụ chăm sóc sức khỏe tối thượng cho NVDA. Sao lưu và khôi phục cài đặt, xác định các add-on xung đột bằng tìm kiếm nhị phân, xem thông tin hệ thống và khởi động lại an toàn khi đã tắt add-on; tất cả từ một menu tiện lợi. Giúp NVDA của bạn luôn hoạt động trơn tru!
Phím nóng:
ALT+Windows+D
Nhấn một lần: mở menu DoctorNVDA
Nhấn hai lần: Khởi động lại NVDA
Nhấn ba lần: Khởi động lại NVDA với các add-on đã bị vô hiệu hóa"""