summary = "DoctorNVDA"
description = """ຊຸດເຄື່ອງມືສຸຂະພາບສຳລັບ NVDA. ສຳຮອງ ແລະ ກູ້ຄືນການຕັ້ງຄ່າ, ຊອກຫາສ່ວນເສີມທີ່ຂັດແຍ່ງກັນດ້ວຍການຄົ້ນຫາແບບໄບນາຣີ, ເບິ່ງຂໍ້ມູນລະບົບ, ເລີ່ມລະບົບໃໝ່ຢ່າງປອດໄພໂດຍປິດສ່ວນເສີມ; ທັງໝົດຈາກເມນູດຽວທີ່ສະດວກ. ໃຫ້ NVDA ຂອງທ່ານເຮັດວຽກຢ່າງລາບລື່ນ!
ປຸ່ມລັດ:
ALT+Windows+D
ແຕະເທື່ອດຽວ: ເປີດເມນູ DoctorNVDA
ແຕະສອງເທື່ອ: ເລີ່ມ NVDA ໃໝ່
ແຕະສາມເທື່ອ: ເລີ່ມ NVDA ໃໝ່ ໂດຍປິດສ່ວນເສີມໄວ້"""