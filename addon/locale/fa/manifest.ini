summary = "DoctorNVDA"
description = """مجموعه ابزار نهایی سلامت برای NVDA. به راحتی از تنظیمات اصلی پشتیبان بگیرید و بازیابی کنید، افزونه‌های متداخل را با جستجوی باینری شناسایی کنید، اطلاعات دقیق سیستم را مشاهده کنید، با افزونه‌های غیرفعال به صورت ایمن بازنشانی کنید؛ همه از یک منوی راحت. NVDA خود را روان نگه دارید!
کلیدهای میانبر:
ALT+Windows+D
یک بار ضربه: باز کردن منوی DoctorNVDA
دو بار ضربه: بازنشانی NVDA
سه بار ضربه: بازنشانی NVDA با افزونه‌های غیرفعال"""