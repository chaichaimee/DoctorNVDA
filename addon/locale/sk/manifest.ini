summary = "DoctorNVDA"
description = """Špičková sada nástrojov pre zdravie vášho NVDA. Zálohujte a obnovujte nastavenia, lokalizujte konfliktné doplnky binárnym vyhľadávaním, zobrazte info o systéme a reštartujte bezpečne s vypnutými doplnkami; všetko z jedného menu. Udržujte svoje NVDA v plynulom chode!
Klávesové skratky:
ALT+Windows+D
Jedno klepnutie: otvoriť menu DoctorNVDA
Dvojité klepnutie: Reštartovať NVDA
Trojité klepnutie: Reštartovať NVDA s vypnutými doplnkami"""