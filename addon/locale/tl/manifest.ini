summary = "DoctorNVDA"
description = """Ang ultimate health toolkit para sa NVDA. Madaling i-backup at i-restore ang settings, tukuyin ang magkakasalungat na add-on gamit ang binary search, tingnan ang impormasyon ng system, at ligtas na mag-restart nang naka-disable ang mga add-on; lahat mula sa isang menu. Panatilihing maayos ang NVDA!
Hot Keys:
ALT+Windows+D
Isang Tap: buksan ang DoctorNVDA menu
Dalawang Tap: I-restart ang NVDA
Tatlong Tap: I-restart ang NVDA nang naka-disable ang mga add-on"""