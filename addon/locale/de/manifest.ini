summary = "DoctorNVDA"
description = """Das ultimative Gesundheits-Toolkit für NVDA. Sichern und wiederherstellen Sie einfach Kerneinstellungen, finden Sie widersprüchliche Add-ons mit der binären Suche, zeigen Sie detaillierte Systeminformationen an, starten Sie sicher mit deaktivierten Add-ons neu und führen Sie Gesundheitsprüfungen durch – alles aus einem praktischen Menü. Halten Sie Ihr NVDA reibungslos am Laufen!
