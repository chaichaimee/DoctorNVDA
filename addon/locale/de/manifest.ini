summary = "DoctorNVDA"
description = """Das ultimative Gesundheits-Toolkit für NVDA. Sichern und wiederherstellen Sie Kern-Einstellungen, finden Sie fehlerhafte Add-ons per Binärsuche, zeigen Sie Systeminfos an, starten Sie sicher ohne Add-ons neu und führen Sie Integritätsprüfungen durch – alles aus einem Menü. Halten Sie NVDA am Laufen!
Tastenkombinationen:
ALT+Windows+D
Einfaches Tippen: DoctorNVDA-Menü öffnen
Doppeltes Tippen: NVDA neu starten
Dreifaches Tippen: NVDA mit deaktivierten Add-ons neu starten"""