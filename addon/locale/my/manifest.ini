summary = "DoctorNVDA"
description = """NVDA အတွက် အကောင်းဆုံး ကျန်းမာရေးကိရိယာအစုံ။ ဆက်တင်များကို အလွယ်တကူ Backup နှင့် Restore လုပ်ခြင်း၊ Binary Search ဖြင့် ပဋိပက္ခဖြစ်သော Add-on များကို ရှာဖွေခြင်းနှင့် အန္တရာယ်ကင်းစွာ Restart ချခြင်းတို့ကို မီနူးတစ်ခုတည်းမှ လုပ်ဆောင်နိုင်သည်။ သင်၏ NVDA ကို ချောမွေ့စွာ လည်ပတ်စေပါ။
Hot Keys:
ALT+Windows+D
တစ်ချက်နှိပ် : DoctorNVDA menu ဖွင့်ရန်
နှစ်ချက်နှိပ် : NVDA ကို Restart ချရန်
သုံးချက်နှိပ် : Add-ons များပိတ်ပြီး NVDA ကို Restart ချရန်"""