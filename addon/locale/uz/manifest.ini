summary = "DoctorNVDA"
description = """NVDA uchun mukammal sog'liq asboblar to'plami. Sozlamalarni zaxiralash va tiklash, binar qidiruv orqali ziddiyatli qo'shimchalarni topish, tizim ma'lumotlarini ko'rish va qo'shimchalarni o'chirib xavfsiz qayta ishga tushirish; barchasi bitta qulay menyuda. NVDA ishlashini silliq saqlang!
Tezkor tugmalar:
ALT+Windows+D
Bir marta bosish: DoctorNVDA menyusini ochish
Ikki marta bosish: NVDA-ni qayta ishga tushirish
Uch marta bosish: Qo'shimchalarni o'chirib NVDA-ni qayta ishga tushirish"""