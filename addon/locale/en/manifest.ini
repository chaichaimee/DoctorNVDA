summary = "DoctorNVDA"
description = """The ultimate health toolkit for NVDA. Easily backup and restore core settings, pinpoint conflicting add-ons with binary search, view detailed system info, restart safely with add-ons disabled, and run health checks; all from one convenient menu. Keep your NVDA running smoothly!
Hot Keys:
ALT+Windows+D
Single Tap : open DoctorNVDA menu
Double Tap : Restart NVDA
Tripple Tap : Restart NVDA with add-ons disabled"""