summary = "DoctorNVDA"
description = """O kit de ferramentas de saúde definitivo para o NVDA. Faça backup e restaure configurações, localize extras em conflito com a pesquisa binária, veja informações do sistema e reinicie com segurança sem extras; tudo num menu conveniente. Mantenha o seu NVDA a funcionar bem!
Teclas de Atalho:
ALT+Windows+D
Um Toque: abrir menu DoctorNVDA
Dois Toques: Reiniciar NVDA
Três Toques: Reiniciar NVDA com extras desativados"""