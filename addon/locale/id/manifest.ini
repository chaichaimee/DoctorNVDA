summary = "DoctorNVDA"
description = """Toolkit kesehatan utama para NVDA. Cadangkan & pulihkan pengaturan dengan mudah, temukan add-on yang konflik dengan pencarian biner, lihat info sistem detail, mulai ulang dengan aman tanpa add-on, dan jalankan cek kesehatan; semua dari satu menu nyaman. Jaga NVDA tetap lancar!
Tombol Pintas:
ALT+Windows+D
Ketuk Sekali: buka menu DoctorNVDA
Ketuk Dua Kali: Mulai ulang NVDA
Ketuk Tiga Kali: Mulai ulang NVDA dengan add-on dinonaktifkan"""